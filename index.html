<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Responsive Image Gallery</h1>

<div class="buttons">
<button onclick="filterSelection('all')">All</button>
<button onclick="filterSelection('nature')">Nature</button>
<button onclick="filterSelection('animals')">Animals</button>
</div>

<div class="gallery">

<div class="image nature">
<img src="images/img1.png" onclick="openLightbox(0)">
</div>

<div class="image animals">
<img src="images/img2.png" onclick="openLightbox(1)">
</div>

<div class="image nature">
<img src="images/img3.png" onclick="openLightbox(2)">
</div>

<div class="image animals">
<img src="images/img4.png" onclick="openLightbox(3)">
</div>

<div class="image nature">
<img src="images/img5.png" onclick="openLightbox(4)">
</div>

<div class="image animals">
<img src="images/img6.png" onclick="openLightbox(5)">
</div>

</div>

<div id="lightbox">

<span class="close" onclick="closeLightbox()">&times;</span>

<button class="prev" onclick="changeImage(-1)">&#10094;</button>

<img id="lightbox-img">

<button class="next" onclick="changeImage(1)">&#10095;</button>

</div>

<script src="script.js"></script>

</body>
</html>
